name: CI Pipeline
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov flake8
          pip install -r requirements.txt 2>/dev/null || pip install -r pyproject.toml 2>/dev/null || true
      - name: Lint
        run: flake8 . --max-line-length=120 --ignore=E501,W503 --exclude=.git,__pycache__,.ipynb_checkpoints
        continue-on-error: true
      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "Tests completed"
